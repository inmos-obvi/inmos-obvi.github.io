<div id="hero" class="hero-image hero-image-setheight{{ if .memorial }} hero-image-memorial{{ end }}" style="background-image: url('{{ .background | relURL }}')">
  <div class="container ">
    <div class="hero-text">
      <span class="hero-section">{{ .section }}</span>
      <h1>{{ .heading }}</h1>
      <p>{{ .subheading }}</p>
    </div>
  </div>
</div>
